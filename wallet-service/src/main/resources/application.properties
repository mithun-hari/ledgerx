# Server — port 8080, different from auth-service
server.port=8080

# PostgreSQL — same database, different service
spring.datasource.url=jdbc:postgresql://localhost:5432/ledgerx
spring.datasource.username=ledgerx_user
spring.datasource.password=ledgerx_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# App name
spring.application.name=wallet-service

# JWT — must match auth-service secret exactly
jwt.secret=ledgerx-super-secret-key-must-be-at-least-256-bits-long-for-hmac
jwt.expiry-ms=900000

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=wallet-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Auth service URL
auth.service.url=http://localhost:8081